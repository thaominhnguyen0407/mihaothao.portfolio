<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .scroll-snap-container {
            scroll-snap-type: y mandatory;
            height: 100vh;
            overflow-y: scroll;
        }
        .scroll-snap-section {
            scroll-snap-align: start;
            min-height: 100vh;
        }
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .animate-float {
            animation: float 10s ease-in-out infinite;
        }
        .soft-text-shadow {
            text-shadow: 0 2px 10px rgba(133, 80, 80, 0.05);
        }
        .editorial-line {
            height: 1px;
            background: linear-gradient(to right, #855050, transparent);
            opacity: 0.2;
        }
        .soft-shadow {
            box-shadow: 0 10px 40px -10px rgba(133, 80, 80, 0.15);
        }
        
        /* Interactive Petal Trail Styles */
        .petal-particle {
            position: fixed;
            pointer-events: none;
            width: 12px;
            height: 18px;
            background: #fab5b5;
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            z-index: 9999;
            transform-origin: center;
            animation: petalFadeOut 1s forwards ease-out;
        }
        @keyframes petalFadeOut {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(0) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container font-body-md overflow-hidden">
<div id="petal-container"></div>
<main class="w-full min-h-screen relative bg-background flex flex-col justify-center">
        <!-- Chapter 1: Hero - Redesigned with Interactive Stats Flower and Navigation Toggle -->
        <section class="relative flex items-center justify-center overflow-hidden bg-background min-h-screen py-12" id="hero">
            <!-- Backdrop gradients -->
            <div class="absolute inset-0 pointer-events-none overflow-hidden bg-gradient-to-br from-[#f6d9d9] via-[#fdf9f5] to-[#e5e2de] opacity-80"></div>
            <div class="absolute inset-0 pointer-events-none overflow-hidden">
                <div class="absolute top-[-20%] left-[-10%] w-[80vw] h-[80vw] bg-[#e8a5a5]/30 rounded-full blur-[120px]"></div>
                <div class="absolute bottom-[-20%] right-[-10%] w-[70vw] h-[70vw] bg-[#d1aeae]/20 rounded-full blur-[100px]"></div>
            </div>
            
            <div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop w-full flex flex-col md:flex-row items-center justify-center relative z-10 pt-4 md:pt-0 gap-6 md:gap-0 md:-space-x-12 lg:-space-x-20">
                
                <!-- LEFT COLUMN: Portrait Images -->
                <div class="w-full md:w-[48%] h-[60vh] md:h-screen flex items-end justify-center relative select-none">
                    <!-- Portrait 1 (Layout 1 - home/6.png) -->
                    <img id="portrait-step1" src="./home/6.png" alt="Thao Nguyen Portrait" class="absolute max-h-[92vh] md:max-h-[96vh] w-auto object-contain object-bottom transition-all duration-700 ease-in-out opacity-100 scale-100 z-10 drop-shadow-2xl">
                    <!-- Portrait 2 (Layout 2 - home/5.png) -->
                    <img id="portrait-step2" src="./home/5.png" alt="Thao Nguyen Navigation Portrait" class="absolute max-h-[85vh] md:max-h-[88vh] w-auto object-contain object-bottom transition-all duration-700 ease-in-out opacity-0 scale-95 z-0 cursor-pointer drop-shadow-2xl hover:brightness-105" title="Click to go back">
                </div>
                
                <!-- RIGHT COLUMN: Interactive Flowers -->
                <div class="w-full md:w-[52%] h-[60vh] md:h-screen flex items-center justify-center relative">
                    
                    <!-- LAYOUT 1: Big Stats Flower -->
                    <div id="flower-container-step1" class="absolute w-full h-full flex items-center justify-center transition-all duration-700 ease-in-out opacity-100 scale-100 z-10">
                        <div class="relative w-[96vw] h-[96vw] md:w-[58vw] md:h-[58vw] max-w-[950px] max-h-[950px]">
                            <svg id="hero-flower-svg" viewBox="0 0 1200 1200" class="w-full h-full drop-shadow-2xl overflow-visible">

                            <!-- Click Here Button in the center -->

                        <div class="relative w-[96vw] h-[96vw] md:w-[58vw] md:h-[58vw] max-w-[950px] max-h-[950px]">
                            
                            <!-- 1. Experience Flower (Top) -->
                            <a href="experience.html" class="absolute left-1/2 top-[32%] -translate-x-1/2 -translate-y-1/2 block w-[50%] h-[50%] hover:scale-105 transition-transform duration-300 group z-30">

                                <svg class="nav-flower-svg w-full h-full drop-shadow-lg overflow-visible" viewBox="0 0 1200 1200"></svg>

                                    <span class="font-sans font-extrabold text-[26px] md:text-[38px] text-primary transition-colors text-shadow-sm select-none" style="text-shadow: 0 2px 4px rgba(255,255,255,0.95), 0 -2px 4px rgba(255,255,255,0.95);">Connect</span>

    </main>
<script>
    // Reveal Animations on Scroll
    const observerOptions = { threshold: 0.1 };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, observerOptions);

    document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));

    // Interactive Petal Trail Effect - Applied from SCREEN_33 logic
    const petalContainer = document.getElementById('petal-container');
    let lastX = 0;
    let lastY = 0;
    const distanceThreshold = 40; // minimum movement distance to spawn a petal

    window.addEventListener('mousemove', (e) => {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > distanceThreshold) {
            createPetal(e.clientX, e.clientY);
            lastX = e.clientX;
            lastY = e.clientY;
        }
    });

    function createPetal(x, y) {
        const petal = document.createElement('div');
        petal.className = 'petal-particle';
        
        // Randomize petal properties
        const size = Math.random() * 10 + 8;
        const rotation = Math.random() * 360;
        const driftX = (Math.random() - 0.5) * 50;
        const driftY = (Math.random() - 0.5) * 50;
        
        petal.style.width = `${size}px`;
        petal.style.height = `${size * 1.5}px`;
        petal.style.left = `${x}px`;
        petal.style.top = `${y}px`;
        petal.style.transform = `rotate(${rotation}deg)`;
        petal.style.background = `rgba(232, 165, 165, ${0.4 + Math.random() * 0.4})`;

        petalContainer.appendChild(petal);

        // Animate drift
        petal.animate([
            { transform: `translate(0, 0) rotate(${rotation}deg)`, opacity: 0.8 },
            { transform: `translate(${driftX}px, ${driftY}px) rotate(${rotation + 90}deg)`, opacity: 0 }
        ], {
            duration: 1000,
            easing: 'ease-out'
        });

        setTimeout(() => {
            petal.remove();
        }, 1000);
    }

    // Hero interactive flower drawing and layout toggling
    document.addEventListener("DOMContentLoaded", () => {
        const CX = 600;
        const CY = 600;
        const PETAL_DIST = 235;
        const PETAL_HW = 190;
        const PETAL_HL = 280;

        const PETALS_DATA = [
          { id: "experience", label: "Experience", number: "6", sub: "Internships", angle: -90 },
          { id: "projects", label: "Projects", number: "20+", sub: "Case Studies", angle: -18 },
          { id: "class", label: "Class of", number: "2027", sub: "Fordham Univ.", angle: 54 },
          { id: "creator", label: "Creator", number: "1M+", sub: "Likes", angle: 126 },
          { id: "global", label: "Global", number: "6", sub: "Countries", angle: 198 }
        ];

        function buildPetalPath(px, py, angleDeg) {
            const rad = (angleDeg * Math.PI) / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);
            const hw = PETAL_HW;
            const hl = PETAL_HL;

            const pts = {
              tip:           [0, -hl],
              base:          [0,  hl],
              rightMid:      [hw, 0],
              leftMid:       [-hw, 0],
              tipRCtrl:      [hw * 0.55, -hl * 0.55],
              rTipCtrl:      [hw, -hl * 0.25],
              rBaseCtrl:     [hw,  hl * 0.25],
              baseRCtrl:     [hw * 0.55,  hl * 0.55],
              baseLCtrl:     [-hw * 0.55, hl * 0.55],
              lBaseCtrl:     [-hw,  hl * 0.25],
              lTipCtrl:      [-hw, -hl * 0.25],
              tipLCtrl:      [-hw * 0.55, -hl * 0.55],
            };

            const r = ([x, y]) => [px + x * cos - y * sin, py + x * sin + y * cos];
            const p = (k) => r(pts[k]).map(v => v.toFixed(1)).join(",");

            return `M ${p("tip")} C ${p("tipRCtrl")} ${p("rTipCtrl")} ${p("rightMid")} C ${p("rBaseCtrl")} ${p("baseRCtrl")} ${p("base")} C ${p("baseLCtrl")} ${p("lBaseCtrl")} ${p("leftMid")} C ${p("lTipCtrl")} ${p("tipLCtrl")} ${p("tip")} Z`;
        }

        function drawFlower(svgElement, isNavFlower = false) {
            if (!svgElement) return;
            svgElement.innerHTML = ''; // clear initial contents

            PETALS_DATA.forEach((petal, pi) => {
                const rad = (petal.angle * Math.PI) / 180;
                const px = CX + PETAL_DIST * Math.cos(rad);
                const py = CY + PETAL_DIST * Math.sin(rad);
                const rotDeg = petal.angle + 90;

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "group origin-center");
                g.style.transformOrigin = `${px}px ${py}px`;

                // Petal path
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", buildPetalPath(px, py, rotDeg));
                path.setAttribute("fill", "#f6d9d9");
                path.setAttribute("stroke", "#855050");
                path.setAttribute("stroke-width", "1.5");
                path.setAttribute("class", "transition-all duration-300 group-hover:fill-[#e8a5a5]/30 group-hover:stroke-[#855050] group-hover:stroke-[2.5px] opacity-[0.85]");
                g.appendChild(path);

                if (!isNavFlower) {
                    // Text group (horizontal, no rotation) - only draw if NOT navigation flower
                    const textGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    
                    // Label (appears on top of the number)
                    const textLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textLabel.setAttribute("x", px);
                    textLabel.setAttribute("y", py - 30);
                    textLabel.setAttribute("text-anchor", "middle");
                    textLabel.setAttribute("fill", "#1c1c19");
                    textLabel.setAttribute("style", "font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 22px;");
                    textLabel.textContent = petal.label;
                    textGroup.appendChild(textLabel);

                    // Number (boldest, biggest, in middle/below label)
                    const textNum = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textNum.setAttribute("x", px);
                    textNum.setAttribute("y", py + 30);
                    textNum.setAttribute("text-anchor", "middle");
                    textNum.setAttribute("fill", "#855050");
                    textNum.setAttribute("style", "font-family: 'Playfair Display', serif; font-weight: 700; font-size: 72px;");
                    textNum.textContent = petal.number;
                    textGroup.appendChild(textNum);

                    // Sub-label (at the bottom)
                    const textSub = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textSub.setAttribute("x", px);
                    textSub.setAttribute("y", py + 70);
                    textSub.setAttribute("text-anchor", "middle");
                    textSub.setAttribute("fill", "#524343");
                    textSub.setAttribute("style", "font-family: 'Plus Jakarta Sans', sans-serif; font-size: 19px; opacity: 0.8;");
                    textSub.textContent = petal.sub;
                    textGroup.appendChild(textSub);

                    g.appendChild(textGroup);
                }
                
                svgElement.appendChild(g);
            });

            // Draw center circle/decoration (no image, no gems)
            const centerCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            centerCircle.setAttribute("cx", CX);
            centerCircle.setAttribute("cy", CY);
            centerCircle.setAttribute("r", "55");
            centerCircle.setAttribute("fill", "#fdf9f5");
            centerCircle.setAttribute("stroke", "#855050");
            centerCircle.setAttribute("stroke-width", "2");
            svgElement.appendChild(centerCircle);
        }

        // Draw the main big stats flower (with petal stats text)
        const mainSvg = document.getElementById("hero-flower-svg");
        drawFlower(mainSvg, false);

        // Draw the 3 smaller navigation flowers (without petal stats text)
        const navSvgs = document.querySelectorAll(".nav-flower-svg");
        navSvgs.forEach(svg => drawFlower(svg, true));

        // Transition toggling logic between Layout 1 and Layout 2
        const btnClickHere = document.getElementById("btn-click-here");
        const portraitStep1 = document.getElementById("portrait-step1");
        const portraitStep2 = document.getElementById("portrait-step2");
        const containerStep1 = document.getElementById("flower-container-step1");
        const containerStep2 = document.getElementById("flower-container-step2");

        if (btnClickHere && portraitStep1 && portraitStep2 && containerStep1 && containerStep2) {
            btnClickHere.addEventListener("click", () => {
                // Hide Layout 1 Elements
                portraitStep1.classList.remove("opacity-100", "scale-100", "z-10");
                portraitStep1.classList.add("opacity-0", "scale-95", "z-0");
                
                containerStep1.classList.remove("opacity-100", "scale-100", "z-10");
                containerStep1.classList.add("opacity-0", "scale-90", "pointer-events-none", "z-0");
                
                // Show Layout 2 Elements
                portraitStep2.classList.remove("opacity-0", "scale-95", "z-0");
                portraitStep2.classList.add("opacity-100", "scale-100", "z-10");
                
                containerStep2.classList.remove("opacity-0", "scale-90", "pointer-events-none", "z-0");
                containerStep2.classList.add("opacity-100", "scale-100", "z-10");
            });

            portraitStep2.addEventListener("click", () => {
                // Show Layout 1 Elements
                portraitStep1.classList.remove("opacity-0", "scale-95", "z-0");
                portraitStep1.classList.add("opacity-100", "scale-100", "z-10");
                
                containerStep1.classList.remove("opacity-0", "scale-90", "pointer-events-none", "z-0");
                containerStep1.classList.add("opacity-100", "scale-100", "z-10");
                
                // Hide Layout 2 Elements
                portraitStep2.classList.remove("opacity-100", "scale-100", "z-10");
                portraitStep2.classList.add("opacity-0", "scale-95", "z-0");
                
                containerStep2.classList.remove("opacity-100", "scale-100", "z-10");
                containerStep2.classList.add("opacity-0", "scale-90", "pointer-events-none", "z-0");
            });
        }
    });
</script>
